# golangci-lint configuration for Split OpenFeature Provider

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - prealloc
    - goconst
    - gocyclo
    - gocognit
    - dupl
    - gocritic
    - revive
    - gosec
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - errorlint
    - exhaustive

  exclusions:
    paths:
      - examples
      - test
      - '.*\.pb\.go$'

    rules:
      - path: '(.+)_test\.go'
        linters:
          - errcheck
          - gocyclo
          - gocognit
          - dupl
          - gocritic
          - gosec
          - goconst
          - govet
          - revive
          - staticcheck
          - misspell
          - unconvert
          - unparam
          - prealloc

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - shadow  # Too many false positives

    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 30

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    staticcheck:
      checks: [ "all" ]

    revive:
      confidence: 0.8
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    gosec:
      severity: medium
      confidence: medium

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - commentedOutCode
        - whyNoLint

    exhaustive:
      default-signifies-exhaustive: true

    prealloc:
      simple: true
      range-loops: true
      for-loops: false
